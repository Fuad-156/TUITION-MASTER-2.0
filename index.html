<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Tuition Master | Connect Teachers & Students</title>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter + Noto Sans Bengali -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #0f172a;
      --text-light: #475569;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #e2e8f0;
      --card-shadow: 0 20px 35px -10px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.02);
      --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-light: #cbd5e1;
      --border: #334155;
      --card-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
    }

    body {
      font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      transition: background 0.3s, color 0.2s;
    }

    /* glassmorphism & animations */
    .glass-card {
      background: var(--surface);
      border-radius: 2rem;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(2px);
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .glass-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.15);
    }
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 2rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: white;
      transition: all 0.2s;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }
    input, select, textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: 0.2s;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
    }
    .animate-fade {
      animation: fadeInUp 0.5s ease-out;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .badge {
      background: var(--primary);
      color: white;
      border-radius: 2rem;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
    }
    /* Layout */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 2rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(12px);
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    /* page containers */
    .page {
      display: none;
      animation: fadeInUp 0.4s ease;
    }
    .active-page {
      display: block;
    }
    /* teacher grid */
    .teacher-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    /* chat box */
    .chat-box {
      height: 400px;
      overflow-y: auto;
      background: var(--surface);
      border-radius: 1.5rem;
      padding: 1rem;
    }
    /* responsive */
    @media (max-width: 768px) {
      .container { padding: 1rem; }
      .nav { flex-direction: column; align-items: stretch; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ======================== NAVIGATION ======================== -->
<div class="nav">
  <div class="logo"><i class="fas fa-chalkboard-user"></i> Tuition Master</div>
  <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
    <button id="themeToggle" class="btn-outline btn" style="padding:0.5rem 1rem;"><i class="fas fa-moon"></i></button>
    <button id="langToggle" class="btn-outline btn" style="padding:0.5rem 1rem;"><i class="fas fa-language"></i> বাংলা/EN</button>
    <button id="logoutBtn" class="btn-outline btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="container" id="appContainer">
  <!-- Login / Register Page -->
  <div id="authPage" class="page active-page">
    <div class="glass-card" style="max-width: 500px; margin: 3rem auto; padding: 2rem; text-align: center;">
      <h1 style="margin-bottom: 1rem;">Welcome to Tuition Master</h1>
      <p id="authToggleText" style="margin-bottom: 2rem;">Sign in to continue</p>
      <form id="authForm">
        <input type="email" id="email" placeholder="Email" required style="margin-bottom: 1rem;">
        <input type="password" id="password" placeholder="Password" required style="margin-bottom: 1rem;">
        <select id="roleSelect" style="margin-bottom: 1rem;">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>
        <div id="teacherExtraFields" style="display: none;">
          <input type="text" id="qualification" placeholder="Qualification (e.g. B.Sc in CSE)">
          <input type="text" id="subject" placeholder="Subject">
          <input type="text" id="fee" placeholder="Tuition fee (BDT/month)">
          <input type="text" id="district" placeholder="District">
          <input type="text" id="experience" placeholder="Experience (years)">
        </div>
        <button type="submit" id="authSubmitBtn" class="btn" style="width:100%;">Login</button>
      </form>
      <p style="margin-top: 1rem;"><a href="#" id="switchAuthMode">Create an account</a></p>
    </div>
  </div>

  <!-- Main Dashboard (student/teacher/admin) -->
  <div id="dashboardPage" class="page">
    <div class="glass-card" style="padding: 1.5rem; margin-bottom: 2rem;">
      <div style="display: flex; justify-content: space-between; flex-wrap: wrap;">
        <h2 id="welcomeMsg">Dashboard</h2>
        <div><span id="userRoleBadge" class="badge"></span></div>
      </div>
      <!-- Dynamic admin/teacher/student tabs -->
      <div id="dashboardTabs" style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;"></div>
    </div>
    <div id="dashboardContent"></div>
  </div>
</div>

<script>
  // ======================== SUPABASE CONFIG (YOUR CREDENTIALS) ==================
  const SUPABASE_URL = 'https://ejsmrureupknqcnzbrpd.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqc21ydXJldXBrbnFjbnpicnBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyMTMxMzAsImV4cCI6MjA5NDc4OTEzMH0.LakY-4cdx7H2fELet2wdt6ckeomzQ3ArwiTSTvuzI40';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ---------- GLOBAL STATE ----------
  let currentUser = null;
  let currentRole = null;  // student, teacher, admin
  let isLoginMode = true;   // true=login, false=register
  let lang = 'en';          // 'en' or 'bn'
  let activeChatReceiver = null;  // { id, name }

  // ---------- Helper: show page ----------
  function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
    document.getElementById(pageId).classList.add('active-page');
  }

  // ---------- Language strings ----------
  const strings = {
    en: { welcome: "Welcome", searchTeachers: "Search Teachers", myMessages: "Messages", schedule: "Schedule", attendance: "Attendance", materials: "Materials", adminPanel: "Admin Panel", earnings: "Earnings" },
    bn: { welcome: "স্বাগতম", searchTeachers: "শিক্ষক খুঁজুন", myMessages: "বার্তা", schedule: "রুটিন", attendance: "হাজিরা", materials: "স্টাডি মেটেরিয়াল", adminPanel: "অ্যাডমিন প্যানেল", earnings: "আয়" }
  };
  function t(key) { return strings[lang][key] || key; }

  // ---------- Render UI after login ----------
  async function renderDashboard() {
    if (!currentUser) return;
    const profile = await fetchProfile(currentUser.id);
    if (!profile) return;
    currentRole = profile.role;
    document.getElementById('userRoleBadge').innerText = currentRole.toUpperCase();
    document.getElementById('welcomeMsg').innerHTML = `${t('welcome')}, ${profile.name || currentUser.email}`;
    const tabsDiv = document.getElementById('dashboardTabs');
    const contentDiv = document.getElementById('dashboardContent');
    tabsDiv.innerHTML = '';
    // Common tabs
    if (currentRole === 'student') {
      addTab('search', '🔍 ' + t('searchTeachers'), () => renderTeacherSearch());
      addTab('messages', '💬 ' + t('myMessages'), () => renderMessagesPanel());
    } else if (currentRole === 'teacher') {
      addTab('schedule', '📅 ' + t('schedule'), () => renderTeacherSchedule());
      addTab('attendance', '📋 ' + t('attendance'), () => renderAttendance());
      addTab('materials', '📚 ' + t('materials'), () => renderMaterials());
      addTab('messages', '💬 ' + t('myMessages'), () => renderMessagesPanel());
    } else if (currentRole === 'admin') {
      addTab('adminDash', '⚙️ ' + t('adminPanel'), () => renderAdminDashboard());
      addTab('users', '👥 Users', () => renderUserList());
      addTab('commissions', '💰 Commissions', () => renderCommissionChart());
    }
    // default first tab
    if (currentRole === 'student') renderTeacherSearch();
    else if (currentRole === 'teacher') renderTeacherSchedule();
    else if (currentRole === 'admin') renderAdminDashboard();

    function addTab(id, label, callback) {
      const btn = document.createElement('button');
      btn.className = 'btn-outline btn';
      btn.innerText = label;
      btn.onclick = () => { callback(); };
      tabsDiv.appendChild(btn);
    }
  }

  // ---------- fetch profile ----------
  async function fetchProfile(userId) {
    const { data, error } = await supabase.from('profiles').select('*').eq('id', userId).single();
    if (error) console.error(error);
    return data;
  }

  // -------------- TEACHER SEARCH (student) --------------
  async function renderTeacherSearch() {
    const { data: teachers, error } = await supabase.from('profiles').select('*').eq('role', 'teacher').eq('approved', true);
    if (error) return;
    const container = document.getElementById('dashboardContent');
    container.innerHTML = `<div class="teacher-grid" id="teacherGrid"></div>`;
    const grid = document.getElementById('teacherGrid');
    teachers.forEach(t => {
      const card = document.createElement('div');
      card.className = 'glass-card';
      card.style.padding = '1.2rem';
      card.innerHTML = `
        <h3>${t.name || t.email}</h3>
        <p><i class="fas fa-graduation-cap"></i> ${t.qualification || 'N/A'} | ${t.experience || 0} yrs</p>
        <p><i class="fas fa-book"></i> ${t.subject || 'General'} | ৳${t.fee}/month</p>
        <p><i class="fas fa-map-marker-alt"></i> ${t.district || 'Any'}</p>
        <button class="btn" data-teacher='${JSON.stringify({ id: t.id, name: t.name })}'>Request & Pay 10% fee</button>
      `;
      grid.appendChild(card);
    });
    document.querySelectorAll('[data-teacher]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const teacher = JSON.parse(btn.getAttribute('data-teacher'));
        // ask for bkash transaction id (manual)
        const trxId = prompt("Enter bKash transaction ID (10% service fee payment):");
        if (!trxId) return;
        await supabase.from('requests').insert({ student_id: currentUser.id, teacher_id: teacher.id, status: 'pending_payment', payment_trx: trxId, amount: 0 });
        alert("Request sent. Admin will verify payment.");
      });
    });
  }

  // ---------- MESSAGING (realtime) ----------
  async function renderMessagesPanel() {
    const container = document.getElementById('dashboardContent');
    container.innerHTML = `
      <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
        <div style="flex:1; min-width:200px;" class="glass-card" style="padding:1rem;"><h3>Conversations</h3><div id="convList"></div></div>
        <div style="flex:2;" class="glass-card" style="padding:1rem;"><div id="chatArea"><p>Select a chat</p></div></div>
      </div>
    `;
    // fetch conversations
    const { data: messages } = await supabase.from('messages').select('*').or(`sender_id.eq.${currentUser.id},receiver_id.eq.${currentUser.id}`);
    const partners = new Map();
    messages?.forEach(m => {
      const other = m.sender_id === currentUser.id ? m.receiver_id : m.sender_id;
      if (!partners.has(other)) partners.set(other, { id: other });
    });
    const convDiv = document.getElementById('convList');
    for (let [pid] of partners) {
      const { data: prof } = await supabase.from('profiles').select('name').eq('id', pid).single();
      const btn = document.createElement('button');
      btn.className = 'btn-outline btn';
      btn.style.margin = '5px';
      btn.innerText = prof?.name || 'User';
      btn.onclick = () => openChat(pid, prof?.name);
      convDiv.appendChild(btn);
    }
    async function openChat(receiverId, name) {
      activeChatReceiver = { id: receiverId, name };
      document.getElementById('chatArea').innerHTML = `<div class="chat-box" id="chatBox"></div><div style="display:flex; margin-top:1rem;"><input id="msgInput" placeholder="Type message..."><button id="sendMsgBtn" class="btn">Send</button></div>`;
      await loadMessages(receiverId);
      const sendBtn = document.getElementById('sendMsgBtn');
      const input = document.getElementById('msgInput');
      sendBtn.onclick = async () => {
        const text = input.value.trim();
        if (!text) return;
        await supabase.from('messages').insert({ sender_id: currentUser.id, receiver_id: receiverId, message: text, created_at: new Date() });
        input.value = '';
        loadMessages(receiverId);
      };
      // realtime subscription
      const subscription = supabase.channel('custom-messages').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => { if (payload.new.sender_id === receiverId || payload.new.receiver_id === receiverId) loadMessages(receiverId); }).subscribe();
    }
    async function loadMessages(otherId) {
      const { data: msgs } = await supabase.from('messages').select('*').or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${otherId}),and(sender_id.eq.${otherId},receiver_id.eq.${currentUser.id})`).order('created_at');
      const box = document.getElementById('chatBox');
      if (!box) return;
      box.innerHTML = msgs?.map(m => `<div style="text-align:${m.sender_id === currentUser.id ? 'right' : 'left'}; margin:0.5rem;"><span class="glass-card" style="display:inline-block; padding:0.5rem 1rem;">${m.message}</span></div>`).join('') || '';
      box.scrollTop = box.scrollHeight;
    }
  }

  // ---------- Teacher schedule ----------
  async function renderTeacherSchedule() {
    const { data: schedules } = await supabase.from('schedules').select('*').eq('teacher_id', currentUser.id);
    const container = document.getElementById('dashboardContent');
    container.innerHTML = `<div class="glass-card" style="padding:1rem;"><h3>My Schedule</h3><div id="scheduleList"></div><input id="newSlot" placeholder="e.g. Mon 4-6 PM"><button id="addSchedule" class="btn">Add</button></div>`;
    const listDiv = document.getElementById('scheduleList');
    listDiv.innerHTML = schedules?.map(s => `<div>${s.slot} <button class="btn-outline btn-sm" onclick="deleteSchedule('${s.id}')">Delete</button></div>`).join('');
    document.getElementById('addSchedule').onclick = async () => {
      const slot = document.getElementById('newSlot').value;
      if (slot) await supabase.from('schedules').insert({ teacher_id: currentUser.id, slot });
      renderTeacherSchedule();
    };
    window.deleteSchedule = async (id) => { await supabase.from('schedules').delete().eq('id', id); renderTeacherSchedule(); };
  }

  async function renderAttendance() { /* minimal */ document.getElementById('dashboardContent').innerHTML = `<div class="glass-card"><p>Attendance tracking (coming soon with date picker)</p></div>`; }
  async function renderMaterials() { /* study materials */ document.getElementById('dashboardContent').innerHTML = `<div class="glass-card"><input placeholder="Upload link or file name"><button class="btn">Share</button><div>List of materials</div></div>`; }
  async function renderAdminDashboard() { document.getElementById('dashboardContent').innerHTML = `<div class="glass-card"><h3>Admin Overview</h3><button id="verifyPayments" class="btn">Verify Pending Payments</button><div id="pendingRequests"></div></div>`; const { data: reqs } = await supabase.from('requests').select('*, profiles(name)').eq('status', 'pending_payment'); document.getElementById('pendingRequests').innerHTML = reqs?.map(r => `<div>${r.profiles?.name} - trx: ${r.payment_trx} <button onclick="approvePayment('${r.id}')">Approve</button></div>`).join(''); window.approvePayment = async (id) => { await supabase.from('requests').update({ status: 'approved' }).eq('id', id); renderAdminDashboard(); }; }
  async function renderUserList() { const { data: users } = await supabase.from('profiles').select('*'); document.getElementById('dashboardContent').innerHTML = `<div class="glass-card">${users?.map(u => `<div>${u.email} - ${u.role} <button class="btn-outline" onclick="approveTeacher('${u.id}')">Approve Teacher</button></div>`).join('')}</div>`; window.approveTeacher = async (uid) => { await supabase.from('profiles').update({ approved: true }).eq('id', uid); alert('approved'); }; }
  async function renderCommissionChart() { document.getElementById('dashboardContent').innerHTML = `<div class="glass-card"><p>Commission earnings chart will be generated here from payments table (mock: ৳12,450 this month)</p></div>`; }

  // ---------- AUTH LOGIC ----------
  const authForm = document.getElementById('authForm');
  const switchAuth = document.getElementById('switchAuthMode');
  const authSubmitBtn = document.getElementById('authSubmitBtn');
  const roleSelect = document.getElementById('roleSelect');
  const teacherFields = document.getElementById('teacherExtraFields');
  roleSelect.addEventListener('change', () => { teacherFields.style.display = roleSelect.value === 'teacher' ? 'block' : 'none'; });
  switchAuth.addEventListener('click', (e) => { e.preventDefault(); isLoginMode = !isLoginMode; authSubmitBtn.innerText = isLoginMode ? 'Login' : 'Register'; document.getElementById('authToggleText').innerText = isLoginMode ? 'Sign in to continue' : 'Create new account'; teacherFields.style.display = 'none'; });
  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    if (isLoginMode) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);
      currentUser = data.user;
      const profile = await fetchProfile(currentUser.id);
      if (profile && profile.role === 'admin') currentRole = 'admin';
      showPage('dashboardPage');
      renderDashboard();
      document.getElementById('logoutBtn').style.display = 'block';
    } else {
      const role = roleSelect.value;
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return alert(error.message);
      const extra = role === 'teacher' ? {
        qualification: document.getElementById('qualification').value,
        subject: document.getElementById('subject').value,
        fee: document.getElementById('fee').value,
        district: document.getElementById('district').value,
        experience: document.getElementById('experience').value
      } : {};
      await supabase.from('profiles').insert({ id: data.user.id, email, role, name: email.split('@')[0], approved: role !== 'teacher' ? true : false, ...extra });
      alert('Registration successful. Please login. Teacher approval pending by admin.');
    }
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => { await supabase.auth.signOut(); currentUser = null; showPage('authPage'); document.getElementById('logoutBtn').style.display = 'none'; });
  document.getElementById('themeToggle').addEventListener('click', () => document.body.classList.toggle('dark'));
  document.getElementById('langToggle').addEventListener('click', () => { lang = lang === 'en' ? 'bn' : 'en'; renderDashboard(); });

  // check session on load
  supabase.auth.getSession().then(async ({ data: { session } }) => { if (session?.user) { currentUser = session.user; showPage('dashboardPage'); await renderDashboard(); document.getElementById('logoutBtn').style.display = 'block'; } else { showPage('authPage'); } });
</script>

<!-- ========== SQL SCHEMA INSTRUCTIONS (run in Supabase SQL Editor) ==========
CREATE TABLE profiles ( id UUID PRIMARY KEY REFERENCES auth.users, email TEXT, role TEXT, name TEXT, approved BOOLEAN DEFAULT false, qualification TEXT, subject TEXT, fee TEXT, district TEXT, experience TEXT );
CREATE TABLE requests ( id SERIAL PRIMARY KEY, student_id UUID, teacher_id UUID, status TEXT, payment_trx TEXT, amount NUMERIC );
CREATE TABLE messages ( id SERIAL PRIMARY KEY, sender_id UUID, receiver_id UUID, message TEXT, created_at TIMESTAMP DEFAULT NOW() );
CREATE TABLE schedules ( id SERIAL PRIMARY KEY, teacher_id UUID, slot TEXT );
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Public read" ON profiles FOR SELECT USING (true);
-- (Add more RLS policies as per needs)
-->
</body>
</html>
